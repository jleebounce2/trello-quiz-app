[phases.setup]
nixPkgs = ["python312"]

[phases.venv]
dependsOn = ["setup"]
cmds = ["python -m venv /opt/venv"]

[phases.install]
dependsOn = ["venv"]
cmds = ["/opt/venv/bin/pip install -r requirements.txt"]

[phases.build]
dependsOn = ["install"]
cmds = ["echo 'Build complete'"]

[start]
cmd = "/opt/venv/bin/gunicorn app:app --bind 0.0.0.0:$PORT"
